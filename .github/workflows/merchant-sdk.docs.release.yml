name: Release docs for Merchant SDK

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - 'merchant-sdk;[0-9]+.[0-9]+.[0-9]+;doc**'
      - 'merchant-sdk;[0-9]+.[0-9]+.[0-9]+-beta[0-9][0-9];doc**'
  workflow_call:
    secrets:
      MOBILE_CI_APP_ID:
        required: true
      MOBILE_CI_APP_PRIVATE_KEY:
        required: true

jobs:
  publish:
    permissions:
      contents: write
    uses: ./.github/workflows/sdk.publish.docs.yml
    with:
      project_id: 'merchant-sdk'
      module_id: 'sdk'
      documentation_title: 'Gini Merchant SDK for Android'
      git_tag: ${{ github.ref }}
      artifact_name: 'merchant-sdk-documentation'
      artifact_path: 'merchant-sdk/sdk/build/docs'
    secrets:
      MOBILE_CI_APP_ID: ${{ secrets.MOBILE_CI_APP_ID }}
      MOBILE_CI_APP_PRIVATE_KEY: ${{ secrets.MOBILE_CI_APP_PRIVATE_KEY }}

